{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 mt-3">
      <h4 class="mb-3 text-success">📝 Voter Registration</h4>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" required placeholder="John Doe"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required placeholder="you@example.com"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password <small class="text-muted">(min 6 chars)</small></label>
          <input type="password" name="password" class="form-control" required minlength="6"/>
        </div>
        <button type="submit" class="btn btn-success w-100">Register</button>
      </form>
      <hr/>
      <p class="text-center mb-0">Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
  </div>
</div>
{% endblock %}
